<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ▼ Modifie le titre de l'onglet ici -->
  <title>Alexis Bleuse — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =====================================================
       FOND — Texte géant qui défile vers la gauche
       Défilement HORIZONTAL indépendant du scroll vertical
       → crée l'effet de parallaxe
       ===================================================== -->
  <div class="marquee-bg" aria-hidden="true">
    <div class="marquee-inner">
      <!-- Doublé pour que la boucle soit seamless -->
      <!-- ▼ Modifie le texte de fond ici -->
      <span>PORTFOLIO — ALEXIS BLEUSE ←&nbsp;&nbsp;&nbsp;</span>
      <span>PORTFOLIO — ALEXIS BLEUSE ←&nbsp;&nbsp;&nbsp;</span>
      <span>PORTFOLIO — ALEXIS BLEUSE ←&nbsp;&nbsp;&nbsp;</span>
      <span>PORTFOLIO — ALEXIS BLEUSE ←&nbsp;&nbsp;&nbsp;</span>
    </div>
  </div>

  <!-- =====================================================
       UI FIXE — toujours visible
       ===================================================== -->

  <!-- Compteur de collection — haut gauche -->
  <!-- Le nombre après "/" = total de cartes (7). Modifie si tu changes le nb de cartes. -->
  <div class="collection-ui">
    <div class="slot-thumb" id="slotThumb" aria-label="Dernière carte collectée">✦</div>
    <div>
      <div class="slot-count"><span id="slotCount">0</span>/9</div>
      <div class="slot-label">CARDS<br>COLLECTED</div>
    </div>
  </div>

  <!-- Pourcentage de progression — bas gauche -->
  <div class="scroll-pct" id="scrollPct" aria-label="Progression">00%</div>

  <!-- Numéro de carte courante — bas droite -->
  <div class="card-ctr" id="cardCtr" aria-label="Carte courante">01 / 09</div>

  <!-- Bouton pilule — bas centre -->
  <!-- ▼ Modifie le texte et/ou le lien ici -->
  <a href="contact.html" class="pill-btn">
    <span class="pill-dot" aria-hidden="true"></span>
    Ouvert aux opportunités · Me contacter
  </a>

  <!-- =====================================================
       SCÈNE — Les cartes sont créées ici par script.js
       ===================================================== -->
  <div class="cards-stage" id="cardsStage" aria-label="Galerie de cartes"></div>

  <!-- =====================================================
       VUE DÉTAIL — s'ouvre au clic sur une carte
       Structure fixe, contenu injecté par script.js
       ===================================================== -->
  <div class="detail-view" id="detailView" role="dialog" aria-label="Détail de la carte" aria-modal="true">

    <!-- Colonne gauche : mini-carte + navigation -->
    <div class="detail-left">
      <!-- Mini-carte de la catégorie sélectionnée -->
      <div class="detail-mini">
        <div class="detail-mini-visual" id="detailMiniVisual"></div>
        <div class="detail-mini-name"   id="detailMiniName"></div>
      </div>

      <!-- Badge "Collectée" -->
      <div class="detail-collected">Collectée</div>

      <!-- Progression du scroll dans la colonne droite -->
      <div class="detail-scroll-pct" id="detailScrollPct">00%</div>

      <!-- Bouton retour -->
      <button class="detail-back" id="detailBackBtn">← Retour à la galerie</button>
    </div>

    <!-- Colonne droite : contenu de la catégorie (injecté par script.js) -->
    <div class="detail-right" id="detailRight">
      <div class="detail-body" id="detailContent">
        <!-- Le contenu est injecté ici par renderDetail() dans script.js -->
      </div>
    </div>

  </div><!-- fin .detail-view -->

  <!-- Bouton ✕ fermer — visible seulement quand le détail est ouvert -->
  <button class="close-x" id="closeBtn" aria-label="Fermer">✕</button>

  <script src="script.js"></script>
</body>
</html>
