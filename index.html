<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alexis Bleuse — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =============================================
       FOND — Énorme texte qui défile horizontalement
       ============================================= -->
  <div class="marquee-bg" aria-hidden="true">
    <div class="marquee-inner">
      <span>PORTFOLIO — ALEXIS BLEUSE ←®</span>
      <span>PORTFOLIO — ALEXIS BLEUSE ←®</span>
      <span>PORTFOLIO — ALEXIS BLEUSE ←®</span>
      <span>PORTFOLIO — ALEXIS BLEUSE ←®</span>
    </div>
  </div>

  <!-- =============================================
       UI FIXE — compteur collection (haut gauche)
       ============================================= -->
  <div class="collection-slot" id="collectionSlot">
    <!-- Miniature de la dernière carte collectée -->
    <div class="slot-thumb" id="slotThumb">✦</div>
    <div>
      <!-- ▼ Modifie "/12" si tu changes le nombre de cartes (= nb d'objets dans CARDS dans script.js) -->
      <div class="slot-count"><span id="slotCount">0</span>/12</div>
      <div class="slot-label-text">CARDS<br>COLLECTED</div>
    </div>
  </div>

  <!-- Pourcentage de progression — bas gauche -->
  <div class="scroll-pct" id="scrollPct">00%</div>

  <!-- Compteur de carte — bas droite -->
  <div class="card-counter" id="cardCounter">01 / 12</div>

  <!-- Bouton pilule fixe — bas centre -->
  <!-- ▼ Modifie le texte et le lien si besoin -->
  <a href="contact.html" class="pill-btn">
    <span class="pill-dot"></span>
    Ouvert aux opportunités · Me contacter
  </a>

  <!-- =============================================
       SCÈNE DES CARTES — générée par script.js
       ============================================= -->
  <div class="cards-stage" id="cardsStage"></div>

  <!-- =============================================
       VUE DÉTAIL — affichée au clic sur une carte
       ============================================= -->
  <div class="detail-view" id="detailView">

    <!-- Colonne gauche : carte miniature + navigation -->
    <div class="detail-left">
      <div class="detail-mini-card">
        <div class="mini-visual" id="detailMiniVisual"></div>
        <div class="mini-name" id="detailMiniName"></div>
      </div>
      <div class="detail-collected-label">Collectée</div>

      <!-- Progression scroll de la vue détail -->
      <div class="detail-progress" id="detailProgress">00%</div>

      <!-- Bouton retour -->
      <div class="detail-back" id="detailBack">← Retour</div>
    </div>

    <!-- Colonne droite : texte éditorial -->
    <div class="detail-right" id="detailRight">
      <div class="detail-scroll-area">
        <p class="detail-eyebrow" id="detailEyebrow"></p>
        <h2 class="detail-title" id="detailTitle"></h2>
        <div class="detail-divider"></div>

        <p class="detail-section-label">Contexte</p>
        <p class="detail-text" id="detailContexte"></p>

        <p class="detail-section-label">Mon rôle</p>
        <p class="detail-text" id="detailRole" style="white-space:pre-line;"></p>

        <p class="detail-section-label">Résultat</p>
        <p class="detail-text" id="detailResultat"></p>

        <div class="detail-actions">
          <!-- ▼ Ce bouton est grisé si lien = '#' dans script.js -->
          <a class="btn btn-accent" id="detailLien" href="#" target="_blank" rel="noopener">Voir le dossier</a>
          <button class="btn btn-outline" id="detailCloseBottom" onclick="document.getElementById('detailCloseBtn').click()">
            ← Retour à la galerie
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- Bouton X fermer la vue détail -->
  <button class="detail-close-btn" id="detailCloseBtn" aria-label="Fermer">✕</button>

  <script src="script.js"></script>
  <script>
    // Lier le bouton "Retour" de la colonne gauche
    document.getElementById('detailBack').addEventListener('click', () => {
      document.getElementById('detailCloseBtn').click();
    });
  </script>
</body>
</html>
