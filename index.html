<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ▼ Modifie le titre de l'onglet ici -->
  <title>Alexis Bleuse — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =====================================================
       FOND — Texte géant qui défile vers la gauche
       ===================================================== -->
  <div class="marquee-bg" aria-hidden="true">
    <div class="marquee-inner">
      <span>PORTFOLIO — ALEXIS BLEUSE ←&nbsp;&nbsp;&nbsp;</span>
      <span>PORTFOLIO — ALEXIS BLEUSE ←&nbsp;&nbsp;&nbsp;</span>
      <span>PORTFOLIO — ALEXIS BLEUSE ←&nbsp;&nbsp;&nbsp;</span>
      <span>PORTFOLIO — ALEXIS BLEUSE ←&nbsp;&nbsp;&nbsp;</span>
    </div>
  </div>

  <!-- =====================================================
       UI FIXE — toujours visible
       ===================================================== -->

  <div class="collection-ui" id="collectionUi" role="button" aria-label="Voir ma collection" tabindex="0">
    <div class="slot-thumb" id="slotThumb" aria-label="Dernière carte collectée">✦</div>
    <div>
      <div class="slot-count"><span id="slotCount">0</span>/10</div>
      <div class="slot-label">CARDS<br>COLLECTED</div>
    </div>
  </div>

  <div class="scroll-pct" id="scrollPct" aria-label="Progression">00%</div>
  <div class="card-ctr" id="cardCtr" aria-label="Carte courante">01 / 10</div>

  <a href="contact.html" class="pill-btn">
    <span class="pill-dot" aria-hidden="true"></span>
    Ouvert aux opportunités · Me contacter
  </a>

  <!-- =====================================================
       SCÈNE — Les cartes sont créées ici par script.js
       ===================================================== -->
  <div class="cards-stage" id="cardsStage" aria-label="Galerie de cartes"></div>

  <!-- =====================================================
       VUE DÉTAIL
       ===================================================== -->
  <div class="detail-view" id="detailView" role="dialog" aria-label="Détail de la carte" aria-modal="true">

    <!-- Hero : fond coloré fixe derrière le scroll -->
    <div class="detail-hero" id="detailHero">
      <h1 class="detail-hero-title" id="detailHeroTitle"></h1>
      <div class="detail-hero-foot">
        <span class="detail-hero-logo">←®</span>
        <span class="detail-hero-collected">COLLECTED</span>
        <span class="detail-hero-type" id="detailHeroType"></span>
      </div>
    </div>

    <!-- Zone scrollable transparente par-dessus le hero -->
    <div class="detail-scroll" id="detailRight">

      <!-- Deux colonnes sur TOUTE la hauteur scrollable -->
      <div class="detail-scroll-inner">

        <!-- Colonne gauche : sidebar sticky — carte + ✕ restent visibles en scrollant -->
        <div class="detail-sidebar-col">
          <div class="detail-sidebar" id="detailSidebar">
            <button class="detail-hero-close" id="closeBtn" aria-label="Fermer">✕</button>
            <div class="detail-sidebar-card-wrap">
              <div class="detail-sidebar-mini" id="detailHeroMiniInner"></div>
            </div>
          </div>
        </div>

        <!-- Colonne droite : spacer transparent (hero visible) puis contenu blanc -->
        <div class="detail-main-col">
          <div class="detail-scroll-spacer"></div>
          <div class="detail-content-wrap">
            <div class="detail-body" id="detailContent"></div>
          </div>
        </div>

      </div>

    </div>

  </div><!-- fin .detail-view -->

  <script src="script.js"></script>
</body>
</html>
